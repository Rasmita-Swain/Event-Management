<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Calculator</title>
    <link rel="stylesheet" href="book.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Allura&family=Audiowide&family=Cinzel+Decorative:wght@400;700;900&family=Eagle+Lake&family=Lugrasimo&family=Macondo+Swash+Caps&family=Ribeye&display=swap"
        rel="stylesheet">

</head>

<body>

    
    <section class="budget-container">
        <div class="book-container">

            <button class="go-back-btn backBtn" onclick="history.back()">← Go Back </button>
            <div class="book-head">
                <h1>Book Your Event</h1>
            </div>

            <div class="budget-form">
                <!-- Event Selection -->
                <form action="" class="book-box" onsubmit="return false">
                    <label for="eventType">Select Event Type :-</label>
                    <select id="eventType">
                        <option value="">-- Select Event --</option>
                        <option value="wedding">Wedding</option>
                        <option value="birthday">Birthday</option>
                        <option value="meeting">Meeting</option>
                        <option value="seminar">Seminar</option>
                        <option value="program">Cultural Program</option>
                        <option value="Others">Others</option>
                    </select>

                    <!-- Dynamic Name Input -->
                    <div id="nameSection" style="display:none; margin-top: 3px;">
                        <label for="nameLabel" id="nameLabel" ></label>
                        <input type="text" id="eventName" placeholder="">
                    </div>
                    <div class="number-input">
                        <label for="Number" class="nameNum">Enter Your Number :-</label>
                      <div class="numberBox">
                        <span>+91</span>
                        <input type="tel" id="Number"  pattern="[0-9]{10}" maxlength="10" placeholder="Enter Your Number">
                      </div>
                    </div>
                    <div class="guest-input">
                        <label for="guests" class="nameGuest">Enter Number of Guests :-</label>
                        <input type="number" id="guests" placeholder="Number of guests">
                    </div>

                    <div class="services">

                        <div class="service" id="service">
                            <h2>Entertainment</h2>
                            <div class="options">
                                <label class="check">
                                    None<input type="checkbox" name="option" value="None" class="check-input">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    DJ-₹4000<input type="checkbox" name="option" value="4000" class="check-input">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Live Band- ₹7000<input type="checkbox" name="option" value="7000" class="check-input">
                                    <div class="checkmark"></div>
                                </label>
                                <br>
                                <button class="addBtn" onclick="addToCart()">Add</button>
                            </div>
                        </div>


                        <div class="service" id="s2">
                            <h2>Decoration</h2>

                            <div class="options">
                                <label class="check">
                                    None<input type="checkbox" name="option" value="None" class="check-input">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Basic-₹1000<input type="checkbox" name="option" value="1000" class="check-input">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Standard-₹3000<input type="checkbox" name="option" value="3000" class="check-input">
                                    <div class="checkmark"></div>
                                </label>
                                <br>
                                <button class="addBtn" onclick="addToCart()">Add</button>
                            </div>
                        </div>

                        <div class="service s3" id="s3">
                            <h2>Photos & Videos</h2>

                            <div class="options">
                                <label class="check">None
                                    <input type="checkbox" name="option" value="None" class="check-input">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Photography-<br>₹3000<input type="checkbox" name="option" value="3000"
                                        class="check-input">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Photo+Video-<br>₹6000<input type="checkbox" name="option" value="6000"
                                        class="check-input">
                                    <div class="checkmark"></div>
                                </label>
                                <br>
                                <button type="button" onclick="addToCart()">Add</button>
                            </div>

                        </div>
                    </div>

                    <div class="food-section">
                        <h2>Catering</h2>
                        <br>

                        <a href="#foodMenu" class="custom-link">Customize Food Menu</a>

                        <br><br>
                        <div id="foodMenu" class="foodMenu">

                            <div class="starters foods">
                                <h3>Starters :</h3><br>

                                <label class="check">
                                    Veg Spring Rolls (₹150) <input type="checkbox" value="150" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Paneer Tikka (₹200)<input type="checkbox" value="200" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Chicken Lollipop (₹180)<input type="checkbox" value="180" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                 <label class="check">
                                    Baby Corn Chilli (₹170)<input type="checkbox" value="170" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                 <label class="check">
                                    Chicken 65 (₹190)<input type="checkbox" value="190" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                 <label class="check">
                                    Veg Manchurian (₹160)<input type="checkbox" value="160" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                            </div>
                            <br>
                            <div class="mainCourse foods">
                                <h3>Main Course :</h3><br>

                                <label class="check">
                                    Butter Chicken (₹250) <input type="checkbox" value="150" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Paneer Butter Masala (₹200)<input type="checkbox" value="200" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Veg Biriyani (₹150)<input type="checkbox" value="200" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                 <label class="check">
                                    Chicken Biriyani (₹220)<input type="checkbox" value="220" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                 <label class="check">
                                    Mutton Curry (₹280)<input type="checkbox" value="280" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                 <label class="check">
                                    Butter Naan (₹40)<input type="checkbox" value="40" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                 <label class="check">
                                    Tandoori Roti (₹25)<input type="checkbox" value="25" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                            </div>
                            <br>

                            <div class="desserts foods">
                                <h3>Desserts :</h3><br>

                                <label class="check">
                                    Gulab Jamun (₹30) <input type="checkbox" value="30" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Ice-Cream (₹60)<input type="checkbox" value="60" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                <label class="check">
                                    Kheer (₹85)<input type="checkbox" value="85" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                                 <label class="check">
                                    Jalebi (₹25)<input type="checkbox" value="25" name="option">
                                    <div class="checkmark"></div>
                                </label><br>
                            </div>


                            <button type="button" onclick="addFood()" class="addCart">Add Food to Cart</button>
                        </div>
                    </div>
                  <div class="finalList">
                    <h2>Your Cart :</h2>

                    <ul id="cartItems"></ul>

                    <h1>Total Budget: ₹<span id="total">0</span></h1>
                  </div>

                  <div class="book-now">

                    <button class="bookNow">FINALIZE ORDER</button>
                  </div>

                </form>
            </div>


    </section>

    <script src="calc.js"></script>
</body>

</html>
